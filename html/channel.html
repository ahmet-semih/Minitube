<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiniTube Channel</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #101827, #1f2937);
      color: #fff;
    }
  </style>
</head>
<body>
  <p>Loading channel…</p>
  <script>
    const params = new URLSearchParams(window.location.search);
    const userId    = params.get('user_id');
    const channelId = params.get('channel_id');
    if (!userId || !channelId) {
      window.location.href = 'login.html';
    } else {
      window.location.href = '../php/channel.php?user_id='    + encodeURIComponent(userId)
                                                + '&channel_id=' + encodeURIComponent(channelId);
    }
  </script>
</body>
</html>

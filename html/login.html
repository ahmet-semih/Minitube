<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiniTube Login</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: Arial, sans-serif; background: linear-gradient(135deg, #101827, #1f2937); color: #fff; }
    .card { width: min(92vw, 440px); padding: 40px 32px; border-radius: 18px; background: rgba(255,255,255,0.08); box-shadow: 0 20px 60px rgba(0,0,0,0.35); backdrop-filter: blur(10px); }
    .eyebrow { margin: 0 0 8px; font-size: 0.85rem; letter-spacing: 0.14em; text-transform: uppercase; color: #93c5fd; }
    h1 { margin: 0 0 12px; font-size: 2rem; }
    p { margin: 0 0 24px; color: #d1d5db; line-height: 1.5; }
    .error { display: none; margin: 0 0 18px; padding: 12px 14px; border-radius: 12px; background: rgba(239,68,68,0.18); border: 1px solid rgba(239,68,68,0.35); color: #fecaca; font-size: 0.95rem; }
    .error.visible { display: block; }
    .field { margin-bottom: 16px; }
    label { display: block; margin-bottom: 8px; font-size: 0.95rem; color: #e5e7eb; }
    input { width: 100%; padding: 14px 16px; border: 1px solid rgba(255,255,255,0.14); border-radius: 12px; background: rgba(15,23,42,0.7); color: #fff; outline: none; font-size: 1rem; }
    input:focus { border-color: #60a5fa; box-shadow: 0 0 0 3px rgba(96,165,250,0.18); }
    .button { display: inline-flex; align-items: center; justify-content: center; width: 100%; margin-top: 8px; padding: 14px 20px; border: 0; border-radius: 999px; background: #22c55e; color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer; transition: transform 0.15s ease, background 0.15s ease; }
    .button:hover { background: #16a34a; transform: translateY(-1px); }
    .footnote { margin-top: 18px; font-size: 0.92rem; color: #9ca3af; text-align: center; }
    .footnote a { color: #93c5fd; text-decoration: none; }
  </style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">MiniTube</p>
    <h1>Sign in</h1>
    <p>Use your username and password to continue to your homepage.</p>

    <div class="error" id="error-box"></div>

    <form action="../php/login.php" method="post">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required />
      </div>
      <button class="button" type="submit">Login</button>
    </form>

    <p class="footnote">Not set up yet? <a href="../html/index.html">Initialize the database</a>.</p>
  </main>

  <script>
    // Read ?error= from URL and show the error box without any PHP
    const params = new URLSearchParams(window.location.search);
    const errorBox = document.getElementById('error-box');
    const messages = {
      credentials: 'Invalid username or password.',
      empty:       'Please enter both username and password.',
      db:          'Database connection failed. Make sure the database is initialized.',
    };
    const msg = messages[params.get('error')];
    if (msg) {
      errorBox.textContent = msg;
      errorBox.classList.add('visible');
    }
    // Pre-fill username if carried back in URL
    const u = params.get('username');
    if (u) document.getElementById('username').value = u;

    document.getElementById('username').focus();
  </script>
</body>
</html>
